<doctype html>
<html>
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Personal Course Organizer</title>
		<link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">Personal Course Organizer</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" >Home</a></li>
                    <li><a href="my-courses.html">My Courses</a></li>
                    <li><a href="add-course.html" class="active">Add Course</a></li>
                    <li><a href="contact-us.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
	<main>
	<section class="welcome">
	<h1>Add a new course</h1>
	<p>Enter the course details to register it 
	in your personal course organizer.</p>
	</section>
	<div class="div-h2">
	<h2>Course Addition Form</h2>
	</div>
		<section>
		<div class="sec-form">
			<form>
			<div>
				<label for="Name">Name course</label><br>
				<input type="text" id="Name" placeholder="Enter name course" required>
			</div><br><br>
			<div>
				<label for="Name-Dr">Name Dr.</label><br>
				<input type="text" id="Name-Dr" placeholder="Enter Name Dr" required>
			</div><br><br>
				<div>
				<label for="number">Credit Hours</label><br>
				<input type="number" id="number" placeholder="Enter Hour" required>
			</div><br><br>
				<div>
				<label for="Notes">Notes</label><br>
				<input class="note" type="text" id="notes" placeholder="Enter Your Notes" required>
			</div><br><br>
			<input type="submit" class="submit" value="Add Course">
			</form>
		</div>
		</section>
	</main>
	<footer>
		<div class="container-footer-content">
			<p>@2026 All rights reserved</p>
		</div>		
	</footer>
</body>
</body>
</html>
